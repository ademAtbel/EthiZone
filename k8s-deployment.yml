apiVersion: apps/v1
kind: Deployment
metadata:
  name: ultimate-master-backend
  labels:
    app: ultimate-master-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ultimate-master-backend
  template:
    metadata:
      labels:
        app: ultimate-master-backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ultimate-master-backend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        image: ultimate-master-backend:latest
        ports:
        - containerPort: 5001
        livenessProbe:
          httpGet:
            path: /
            port: 5001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5001"
        - name: MONGO_URI
          value: "mongodb+srv://user:pass@cluster.mongodb.net/prod?retryWrites=true&w=majority"
        - name: MONGO_MAX_POOL_SIZE
          value: "30"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: WEB_CONCURRENCY
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: ultimate-master-backend-service
spec:
  type: ClusterIP
  selector:
    app: ultimate-master-backend
  ports:
  - port: 80
    targetPort: 5001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ultimate-master-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ultimate-master-backend
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
